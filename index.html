<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhil Rawat | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Tool Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Slick Slider CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
</head>
<body>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <img src="your-photo.jpg" alt="Akhil Rawat" class="profile-img">
            <h1>Akhil Rawat</h1>
            <p class="description">Video Production Professional & Entrepreneur specializing in AI-driven media and cinematic storytelling.</p>
            <div class="tool-icons">
                <i class="fab fa-adobe" title="After Effects"></i>
                <i class="fas fa-magic" title="AI Video Tools"></i>
                <i class="fas fa-code" title="Web Dev"></i>
                <i class="fas fa-camera-video" title="Production"></i>
                <!-- Add more icons here -->
            </div>
        </div>
    </header>

    <!-- Client Slider -->
    <section class="clients">
        <div class="container">
            <h3>Trusted By</h3>
            <div class="client-slider">
                <div><img src="client1-logo.png" alt="Client"></div>
                <div><img src="client2-logo.png" alt="Client"></div>
                <div><img src="client3-logo.png" alt="Client"></div>
                <div><img src="client4-logo.png" alt="Client"></div>
                <div><img src="client5-logo.png" alt="Client"></div>
            </div>
        </div>
    </section>

    <!-- Portfolio Sections -->
    <main class="container">
        
        <!-- Long Form -->
        <section class="portfolio-section">
            <h2>Long Form Content</h2>
            <div class="video-grid long-form">
                <div class="video-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
                <div class="video-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
            </div>
        </section>

        <!-- Podcasts -->
        <section class="portfolio-section">
            <h2>Podcast Series</h2>
            <div class="video-grid podcasts">
                <div class="video-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
                <div class="video-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
            </div>
        </section>

        <!-- Reels -->
        <section class="portfolio-section">
            <h2>Shorts & Reels</h2>
            <div class="reels-grid">
                <div class="reel-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
                <div class="reel-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
                <div class="reel-card"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Akhil Rawat. All Rights Reserved.</p>
    </footer>

    <!-- Scripts for Slider -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script>
        $(document).ready(function(){
            $('.client-slider').slick({
                slidesToShow: 4,
                slidesToScroll: 1,
                autoplay: true,
                autoplaySpeed: 2000,
                arrows: false,
                responsive: [
                    { breakpoint: 768, settings: { slidesToShow: 2 } }
                ]
            });
        });
    </script>
</body>
</html>
